name: Purge jsDelivr Cache For All Changed Files

on:
  # HÀNH ĐỘNG 1: Kích hoạt khi BẠN tự push tay code lên nhánh main
  push:
    branches:
      - main

  # HÀNH ĐỘNG 2: Kích hoạt NGAY SAU KHI workflow Cronjob (xoilactv) chạy xong thành công
  workflow_run:
    workflows: ["Manual Run"]  # 👈 Điền chính xác cái 'name:' ở dòng đầu tiên trong file xoilactv.yml của bạn
    types:
      - completed

  # Cho phép bấm nút chạy bằng tay nếu muốn
  workflow_dispatch:

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    # Điều kiện an toàn: Nếu kích hoạt bởi workflow_run thì phải đảm bảo workflow đó chạy THÀNH CÔNG (success)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Lấy 2 commit gần nhất để so sánh sự thay đổi

      - name: Wait for GitHub CDN to sync
        run: sleep 20

      - name: Detect All Changed Files and Purge jsDelivr
        run: |
          echo "🔍 Đang quét toàn bộ các file được Add hoặc Edit..."
          
          # Lấy danh sách file thay đổi (Added và Modified) giữa commit hiện tại và liền trước
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "✨ Không có file nào thay đổi trong commit này."
            exit 0
          fi
          
          echo "📋 Danh sách file cần xóa cache:"
          echo "$CHANGED_FILES"
          echo "----------------------------------------"
          
          while read -r FILE; do
            [ -z "$FILE" ] && continue
            
            echo "⚡ Đang gửi yêu cầu dọn cache cho file: $FILE"
            PURGE_URL="https://purge.jsdelivr.net/gh/lamlongtv1990/TVMedia_V2@main/$FILE"
            RESPONSE=$(curl -s -X GET "$PURGE_URL")
            
            echo "📥 Phản hồi từ jsDelivr: $RESPONSE"
            echo "----------------------------------------"
          done <<< "$CHANGED_FILES"
