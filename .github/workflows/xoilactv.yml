name: Manual Run

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-xoilac-from-cronjob]  # 👈 THÊM DÒNG NÀY ĐỂ NHẬN TRIGGER TỪ CRON-JOB.ORG

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml brotli
      
      - name: Run XoilacTV
        run: |
          cd IPTV_AUTO
          python xoilactv.py
      
      - name: Commit and push M3U file
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add IPTV_AUTO/xoilactv.m3u
          git commit -m "Update xoilactv.m3u [skip ci]" || echo "No changes"
          git push
