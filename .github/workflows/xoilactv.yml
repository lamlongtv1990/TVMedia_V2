name: Manual Run

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-xoilac-from-cronjob]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('IPTV_AUTO/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          cd IPTV_AUTO
          pip install --cache-dir ~/.cache/pip -r requirements.txt
      
      - name: Run XoilacTV
        run: |
          cd IPTV_AUTO
          python xoilactv.py
      
      - name: Commit and push M3U file
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add IPTV_AUTO/xoilactv.m3u
          git commit -m "Update xoilactv.m3u [skip ci]" || echo "No changes"
          git push
